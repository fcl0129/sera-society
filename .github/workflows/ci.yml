name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fail if merge conflict markers exist
        run: |
          if rg -n "^(<<<<<<<|=======|>>>>>>>)" src .github README.md supabase; then
            echo "Merge conflict markers detected. Resolve conflicts before pushing."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm install --include=dev --no-package-lock

      - name: Build
        run: npm run build
